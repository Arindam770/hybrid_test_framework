# ─────────────────────────────────────────────────────────────────────
# tox.ini
#
# Usage:
#   tox                        → run ALL tests serially      (py314 env)
#   tox -e parallel            → run ALL tests in parallel   (-n auto)
#
#   tox -m e2e                 → only @e2e  scenarios  (serial)
#   tox -m login               → only @login scenarios  (serial)
#   tox -m EventHub            → only @EventHub         (serial)
#   tox -m smoke               → only @smoke            (serial)
#   tox -m regression          → only @regression       (serial)
#
#   Parallel run for a single marker — pass -n via posargs:
#   python -m tox -m login -- -n auto
#   python -m tox -m e2e   -- -n 4
#
# Adding a NEW marker (e.g. @api):
#   1. Tag the scenario in your .feature file  →  @api
#   2. Register it in pytest.ini under [markers]  →  api: API tests
#   3. Add a new [testenv:api] block at the bottom (copy any existing one)
# ─────────────────────────────────────────────────────────────────────

[tox]
requires = tox>=4
envlist = py314
skipsdist = True

# ── Base / default environment ────────────────────────────────────────
[testenv]
deps = -r {toxinidir}/requirements.txt
setenv =
    PYTHONPATH = {toxinidir}/test
passenv = *
changedir = {toxinidir}
commands =
    pytest -v -s {posargs} --disable-warnings

# ── Parallel environment ──────────────────────────────────────────────
# Runs ALL tests across all available CPU cores.
# -s is intentionally omitted: stdout from N workers would interleave.
[testenv:parallel]
commands = pytest -v -n auto {posargs} --disable-warnings

# ── Marker-based environments ─────────────────────────────────────────
# Each env carries a `labels` entry matching its name.
# `tox -m <label>` selects that env and runs pytest -m <label>
# so only the scenarios tagged with <label> in .feature files run.
# deps / setenv / passenv / changedir are inherited from [testenv] above.

[testenv:e2e]
labels = e2e
commands = pytest -v -s -m e2e {posargs} --disable-warnings

[testenv:login]
labels = login
commands = pytest -v -s -m login {posargs} --disable-warnings

[testenv:EventHub]
labels = EventHub
commands = pytest -v -s -m EventHub {posargs} --disable-warnings

[testenv:smoke]
labels = smoke
commands = pytest -v -s -m smoke {posargs} --disable-warnings

[testenv:regression]
labels = regression
commands = pytest -v -s -m regression {posargs} --disable-warnings

;  [testenv:my_new_tag]
;   labels   = my_new_tag
;   commands = pytest -v -s -m my_new_tag {posargs} --disable-warnings